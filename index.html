/* ============ HELPERS ============ */
function fmt(n){try{return Number(n).toLocaleString('en-MY',{minimumFractionDigits:0,maximumFractionDigits:0})}catch(e){return Math.round(n).toString()}}
function sevRate(y){return y<=2?10:y<=5?15:20}
function calcSev(s,y,ct){let d=s/26,r=sevRate(y);if(ct==='union')r=Math.min(r+5,25);if(ct==='executive')r=Math.min(r+8,30);return Math.round(r*y*d)}
function calcEIS(s,y,on){if(!on)return 0;let m=Math.min(s,1700),pct=y<5?.8:.7,max=Math.min(m*pct,1360);return Math.round(max*6)}
function calcEPF(on,bal,s,y){if(!on)return 0;if(bal>0)return Math.round(bal*.4);let emp=s>5e3?12:11,ee=s>5e3?16:11,t=0;for(let i=0;i<y;i++)t+=(emp+ee)/100*s*12*1.045;return Math.round(t*.3)}
function termTax(y,sev){let ex=y*1e4;if(sev<=ex)return 0;let tx=sev-ex;return tx<=5e3?0:tx<=2e4?(tx-5e3)*.01:tx<=35e3?150+(tx-2e4)*.03:tx<=50e4?600+(tx-35e3)*.06:Math.round(tx*.08)}
function noticePay(s,n){return Math.round(s*n)}

html+=mkNB('nf','📅 '+T.d4,T.d4d);html+=`</div></div>`;
html+=`<div class="cd"><div class="ct" style="margin-bottom:12px">${T.se}</div><div class="id" style="margin-bottom:16px">${T.se_i}</div><div class="g3">`;
html+=`<div class="st"><div class="sv" style="font-size:20px">${T.se1.split('\n')[0]}</div><div class="sl">${T.se1.split('\n')[1]}</div></div>`;
html+=`<div class="st"><div class="sv" style="font-size:20px">${T.se2.split('\n')[0]}</div><div class="sl">${T.se2.split('\n')[1]}</div></div>`;
html+=`<div class="st"><div class="sv" style="font-size:20px">${T.se3.split('\n')[0]}</div><div class="sl">${T.se3.split('\n')[1]}</div></div></div>`;
html+=`<div class="id" style="margin-top:12px">${T.se_q}</div></div>`;
html+=`<div class="cd"><div class="ct" style="margin-bottom:12px">${T.ep}</div><div class="id" style="margin-top:8px">${T.ep1}</div><div class="id" style="margin-top:8px">${T.ep2}</div></div>`;
html+=`<div class="cd"><div class="ct" style="margin-bottom:12px">${T.cv}</div><div class="id">${T.cv1}</div><div class="id" style="margin-top:6px">${T.cv2}</div><div class="id" style="margin-top:6px">${T.cv3}</div><div class="id" style="margin-top:6px">${T.cv4}</div><div class="id" style="margin-top:6px">${T.cv5}</div></div></div>`;

/* HELP */
html+=`<div class="pg" id="p-help"><div class="ct" style="font-size:22px;margin-bottom:20px">${T.he_t}</div><div class="g2"><div class="cd"><div class="ct" style="margin-bottom:12px">${T.gh}</div>`;
html+=mkIB(T.gh1,T.gh1d),html+=mkIB(T.gh2,T.gh2d),html+=mkIB(T.gh3,T.gh3d),html+=mkIB(T.gh4,T.gh4d);
html+=`</div><div class="cd"><div class="ct" style="margin-bottom:12px">${T.jm}</div>`;

html+=mkIB(`<a href="https://www.cgc.com.my" target="_blank" style="color:var(--a)">${T.cr1}</a>`,T.cr1d),html+=mkIB(T.cr2,T.cr2d);

}

function mkStat(l,v,c){return`<div class="st"><div class="sv" style="color:var(--${c})">${v}</div><div class="sl">${l.replace(/\n/g,' ')}</div></div>`}
function mkTl(n,t,d,c){return`<div class="ti"><div class="tdot" style="background:${c}"></div><div class="tt">${t}</div><div class="tw">${d}</div></div>`}
function mkIB(h,bd){return`<div class="ib"><div class="ih">${h}</div><div class="id">${bd}</div></div>`}
function mkNB(t,h,bd){return`<div class="nb ${t}"><b>${h}</b><br><span style="font-size:13px">${bd}</span></div>`}

/* ========== NAV ========== */
function show(pg,el){
document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
document.querySelectorAll('.tb').forEach(t=>t.classList.remove('on'));
document.getElementById('p-'+pg).classList.add('on');
if(!el){document.querySelector(`.tb[data-p="${pg}"]`)?.classList.add('on');}
else el.classList.add('on');
if(pg==='results')showResults();
window.scrollTo({top:0,behavior:'smooth'});
}

/* ========== AUTO ========== */
function autoCalc(){}

/* ========== RESULTS ========== */
function showResults(){
const T=_T[L]||_T.en,D=d();
const actualRate=sevRate(D.yrs)+(D.ct==='union'?5:D.ct==='executive'?8:0);
const isDismiss=D.tt==='dismiss',isMSS=D.tt==='mutual';
let sev=isDismiss?0:calcSev(D.salary,D.yrs,D.ct);
let eis=(isMSS||isDismiss||!D.socso)?0:calcEIS(D.salary,D.yrs,D.socso);
let epf=calcEPF(D.epf,D.epfbal,D.salary,D.yrs),np=noticePay(D.salary,D.notice);
let tax=termTax(D.yrs,sev),total=sev+eis+epf+np-tax,run=D.expenses>0?total/D.expenses:0,tt=sev+eis+epf+np;
let h=`<div class="ct" style="font-size:22px;margin-bottom:16px">${T.r_t}</div>`;
let ctLabel=D.ct==='union'?T.co[1]:D.ct==='executive'?T.co[2]:T.co[0];
let ttLabel=D.tt==='retrench'?T.to[0]:D.tt==='dismiss'?T.to[1]:T.to[2];
h+=`<div class="nb nfo" style="margin-bottom:12px;font-size:13px"><b>${T.r_ctx}</b><br>${ctLabel} + ${ttLabel}</div>`;
h+=`<div class="g4" style="margin-bottom:16px">`;
const rc=run>8?'g':run>4?'a':'r';
h+=`<div class="st"><div class="sv" style="color:var(--${rc})">RM ${fmt(total)}</div><div class="sl">${T.r_ttl}</div><div class="su sg">After tax (RM ${fmt(tax)})</div></div>`;
h+=`<div class="st"><div class="sv" style="color:var(--a)">RM ${fmt(sev)}</div><div class="sl">${T.r_sev}</div><div class="su sa">${actualRate} ${T.sev_label} ${D.yrs.toFixed(1)} ${T.yrs_label}</div></div>`;
h+=`<div class="st"><div class="sv" style="color:var(--p)">RM ${fmt(eis)}</div><div class="sl">${T.r_eis}</div><div class="su sa">6 ${T.mo} × RM ${fmt(eis/6)}/${T.mo}</div></div>`;
h+=`<div class="st"><div class="sv" style="color:var(--am)">RM ${fmt(epf)}</div><div class="sl">${T.r_epf}</div><div class="su sa"></div></div></div>`;
h+=`<div class="g4" style="margin-bottom:16px"><div class="st"><div class="sv" style="color:var(--c)">RM ${fmt(np)}</div><div class="sl">${T.r_not}</div><div class="su sa">${D.notice} ${T.mop}</div></div>`;
h+=`<div class="st"><div class="sv" style="color:var(--r)">RM ${fmt(D.expenses)}</div><div class="sl">${T.r_exp}</div></div>`;
h+=`<div class="st"><div class="sv" style="color:var(--${rc})">${run.toFixed(1)} ${T.mop}</div><div class="sl">${T.r_run}</div><div class="su s${rc}">${run<=4?T.r_u:run>12?T.r_c:T.r_m}</div></div></div>`;

h+=`<div class="g2"><div class="cd"><div class="ct" style="margin-bottom:16px">${T.r_brk}</div>`;
[{l:T.p_sev,v:sev,c:'var(--a)'},{l:T.p_eis,v:eis,c:'var(--p)'},{l:T.p_epf,v:epf,c:'var(--am)'},{l:T.p_not,v:np,c:'var(--c)'}].forEach(i=>{
let pct=tt>0?i.v/tt*100:0;
h+=`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${i.l}</span><span style="font-weight:600;color:${i.c}">RM ${fmt(i.v)}</span></div><div class="pb"><div class="pbf" style="width:${pct}%;background:${i.c}"></div></div></div>`;
});
h+=`</div><div><div class="cd" style="margin-bottom:16px"><div class="ct" style="margin-bottom:16px">${T.r_tl}</div><div class="tl">`;
h+=mkTl(1,T.r_t1,`RM ${fmt(sev)} + RM ${fmt(np)} — ${T.r_t1d}`,'var(--g)'),
h+=mkTl(1,T.r_t2,`RM ${fmt(eis/6)}/${T.mo} × 6 — ${T.r_t2d}`,'var(--am)'),
h+=mkTl(1,T.r_t3,`RM ${fmt(epf)} — ${T.r_t3d}`,'var(--p)');
h+=`</div></div></div></div>`;

h+=`<div class="cd" style="margin-top:16px"><div class="ct" style="margin-bottom:12px">${T.r_pl}</div>`;
let plans=[];
if(run<=3)plans.push({t:'err',h:T.plan_crit,b:T.plan_crit_d});
else if(run<=6)plans.push({t:'wrn',h:T.plan_mod,b:T.plan_mod_d});
else plans.push({t:'ok',h:T.plan_ok,b:T.plan_ok_d});
if(tax<=0)plans.push({t:'ok',h:T.plan_tax,b:T.plan_tax_d});
else plans.push({t:'wrn',h:'💰 Tax: RM '+fmt(tax),b:'May be partially taxable.'});
if(D.yrs<1)plans.push({t:'err',h:T.plan_srt,b:T.plan_srt_d});
if(isDismiss)plans.push({t:'err',h:'⚠️ Dismissed = RM0',b:'Employment Act: misconduct = zero benefits. SOCSO/EIS eligible.'});
if(isMSS)plans.push({t:'wrn',h:'⚠️ Voluntary — No EIS',b:'EIS pays only retrenchment. Check your letter.'});
plans.push({t:'nfo',h:T.plan_dl,b:T.plan_dd.replace(/\n/g,'<br>')});
plans.forEach(p=>{h+=`<div class="nb ${p.t}" style="margin-bottom:8px"><b>${p.h}</b><br><span style="font-size:13px">${p.b}</span></div>`;});
h+=`</div>`;

h+=`<div class="cd" style="margin-top:16px"><div class="ct" style="margin-bottom:12px">${T.r_cl}</div>`;
T.ch.forEach((t,i)=>{h+=`<div class="cli" onclick="this.classList.toggle('open')"><input type="checkbox" onclick="event.stopPropagation();this.closest('.cli').classList.toggle('done')"><div class="cx"><div class="cxh">${t}</div><div class="cxd">${T.chd[i]}</div></div></div>`;});
h+=`</div>`;

h+=`<div class="cd" style="margin-top:16px;text-align:center"><div class="ct">${T.r_sh}</div><p style="font-size:14px;color:var(--td);margin:10px 0">${T.r_shd}</p><button class="btn bp" onclick="window.print()">${T.r_p}</button></div>`;

document.getElementById('rc').innerHTML=h;
window.scrollTo({top:0,behavior:'smooth'});
}
